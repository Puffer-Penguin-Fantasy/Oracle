name: Puffer Oracle Notarizer

on:
  schedule:
    # Runs at :45 past every hour — giving sync (which runs every 2 min) 
    # plenty of time to flush all Fitbit data before we sign on-chain.
    - cron: '45 * * * *'
  workflow_dispatch: # manual trigger for testing

jobs:
  notarize:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run oracle notarizer
        run: node oracle.js
        timeout-minutes: 10
        env:
          ORACLE_PRIVATE_KEY: ${{ secrets.ORACLE_PRIVATE_KEY }}
          MODULE_ADDRESS: ${{ secrets.MODULE_ADDRESS }}
          MOVEMENT_NODE_URL: ${{ secrets.MOVEMENT_NODE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
