name: Puffer Oracle 15min Sync

on:
  push:
    branches: [ main ]
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: 

jobs:
  sync-oracle:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Oracle (One-Shot)
        run: node oracle.js
        env:
          # Using separate secrets avoids formatting issues with .env files
          ORACLE_PRIVATE_KEY: ${{ secrets.ORACLE_PRIVATE_KEY }}
          MODULE_ADDRESS: ${{ secrets.MODULE_ADDRESS }}
          MOVEMENT_NODE_URL: https://testnet.movementnetwork.xyz/v1
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FITBIT_CLIENT_ID: ${{ secrets.FITBIT_CLIENT_ID }}
          FITBIT_CLIENT_SECRET: ${{ secrets.FITBIT_CLIENT_SECRET }}
