name: Puffer Oracle 15min Sync

on:
  push:
    branches: [ main ]
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: 

jobs:
  sync-oracle:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Create .env from GitHub Secret
        # This takes your "ORACLE_ENV" secret and writes it into a file for the script to read!
        run: echo "${{ secrets.ORACLE_ENV }}" > .env

      - name: Run Oracle (One-Shot)
        run: node oracle.js
